<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Tabela de Produtos</title>
  <link rel="stylesheet" href="style2.css">
</head>

<body>
  <h2>Tabela de Produtos</h2>
  <table>
    <thead bgcolor="#f2f2f2">
      <tr align="center">
        <th scope="col">ID</th>
        <th scope="col">Produto</th>
        <th scope="col">Categoria</th>
        <th scope="col">Preço (R$)</th>
        <th scope="col">Estoque</th>
        <th scope="col">Status</th>
      </tr>
    </thead>
    <tbody>
      <tr align="center">
        <td>1</td>
        <td>Notebook</td>
        <td rowspan="2">Eletrônicos</td>
        <td>3500,00</td>
        <td>15</td>
        <td bgcolor="#c8e6c9">Disponível</td>
      </tr>
      <tr align="center">
        <td>2</td>
        <td>Smartphone</td>
        <td>2200,00</td>
        <td>30</td>
        <td bgcolor="#c8e6c9">Disponível</td>
      </tr>
      <tr align="center">
        <td>3</td>
        <td>Cadeira Gamer</td>
        <td>Móveis</td>
        <td>1200,00</td>
        <td>5</td>
        <td bgcolor="#fff3cd">Baixo estoque</td>
      </tr>
      <tr align="center">
        <td>4</td>
        <td>Mouse</td>
        <td>Acessórios</td>
        <td>150,00</td>
        <td>0</td>
        <td bgcolor="#f8d7da">Indisponível</td>
      </tr>
    </tbody>
    <tfoot>
      <tr align="center">
        <th colspan="4">Total de Produtos</th>
        <td colspan="2">4 itens cadastrados</td>
      </tr>
    </tfoot>
  </table>
</body>

</html>
